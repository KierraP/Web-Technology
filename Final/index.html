<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Princess Dress Up</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aladin&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<h1>Princess Dress Up</h1>

<div id="game">
  <div id="character">
    <img id="background">
    <img id="base">
    <img id="shoes">
    <img id="bottom">
    <img id="top">
    <img id="jacket">
    <img id="accessory">
    <img id="hair">
  </div>


  <div id="controls">
    <div id="options-layout">
      <div class="options-column">
        <h2>Hair</h2>
        <div id="hair-options" class="options"></div>
        <h2>Tops</h2>
        <div id="top-options" class="options"></div>
        <h2>Bottoms</h2>
        <div id="bottom-options" class="options"></div>
      </div>
      <div class="options-column">
        <h2>Jackets</h2>
        <div id="jacket-options" class="options"></div>
        <h2>Accessories</h2>
        <div id="accessory-options" class="options"></div>
        <h2>Shoes</h2>
        <div id="shoes-options" class="options"></div>
      </div>
    </div>

    <div id="button-row">
  <button id="randomBtn">Random Outfit</button>
  <button id="screenshotBtn">Save Outfit</button>
</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
