<!DOCTYPE html>
<html>
<head>
  <title>Planets</title>
</head>

<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// background
var scene = new THREE.Scene();
var backgrounds = [
  'stars.jpg',
  'stars2.jpg',
  'stars3.jpg',
  'stars4.jpg',
  'stars5.jpg'
];
var bgIndex = 0;
var bgLoader = new THREE.TextureLoader();

function setBackground(i) {
  bgLoader.load(backgrounds[i], function(texture) {
    scene.background = texture;
  });
}
setBackground(0);
setInterval(function() {
  bgIndex = (bgIndex + 1) % backgrounds.length;
  setBackground(bgIndex);
}, 4000);

// camera
var camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 120;

// renderer
var renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
var light = new THREE.PointLight(0xffffff, 1);
light.position.set(50, 50, 50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

//planets
function makePlanet(size, color) {
  var geo = new THREE.SphereGeometry(size, 20, 20);
  var mat = new THREE.MeshStandardMaterial({ color: color });
  var mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  return mesh;
}

var planet1 = makePlanet(10, 0x3368ff);
var planet2 = makePlanet(6, 0xff3345);
var planet3 = makePlanet(4, 0x33ff86);


// I got the sun model here: "Sun with 2K Textures" (https://skfb.ly/oP7uS) by ayushcodemate is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/).
var sun;
var loader = new THREE.GLTFLoader();
loader.load('sun.glb', function(gltf) {
  sun = gltf.scene;
  sun.scale.set(4, 4, 4);
  scene.add(sun);
});


//animation
function animate() {
  requestAnimationFrame(animate);
  var t = Date.now() * 0.001;

  // planets
  planet1.rotation.y += 0.01;
  planet2.rotation.y += 0.05;
  planet3.rotation.y += 0.010;
  planet1.position.x = Math.cos(t) * 150;
  planet1.position.z = Math.sin(t) * 150;
  planet2.position.x = Math.cos(t * 1.5) * 90;
  planet2.position.z = Math.sin(t * 1.5) * 90;
  planet3.position.x = Math.cos(t * 2) * 50;
  planet3.position.z = Math.sin(t * 2) * 50;

 // sun
  if (sun) {
    sun.rotation.y += 0.005;
  }
  renderer.render(scene, camera);
}

animate();
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
