<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Phaser Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

//Here is what I changed:
//1. Changed player sprite to a dog.
//2. Changed Jump key to space bar.
//3. Added a red star that is worth more points.
//4. Made gravity random for each star.
//5. Added spikes that damage player on floor. 
//6. Added level progression each time stars are collected.

var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 300 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

var player;
var stars;
var bombs;
var platforms;
var cursors;
var score = 0;
var gameOver = false;
var scoreText;
var level = 1;

var game = new Phaser.Game(config);

function preload ()
{
    this.load.image('sky', 'assets/sky.png');
    this.load.image('ground', 'assets/platform.png');
    this.load.image('star', 'assets/star.png');
    this.load.image('bomb', 'assets/bomb.png');
    this.load.image('spike', 'assets/spike.png');
    this.load.image('redstar', 'assets/redstar.png');
    this.load.spritesheet('dog', 'assets/dog.png',
        { frameWidth: 32, frameHeight: 48 });
    
}

function create ()
{
    //  A simple background for our game
    this.add.image(400, 300, 'sky');

    //  The platforms group contains the ground and the 2 ledges we can jump on
    platforms = this.physics.add.staticGroup();

    //  Here we create the ground.
    //  Scale it to fit the width of the game (the original sprite is 400x32 in size)
    platforms.create(400, 568, 'ground').setScale(2).refreshBody();

    //  Now let's create some ledges
    platforms.create(600, 400, 'ground');
    platforms.create(50, 250, 'ground');
    platforms.create(750, 220, 'ground');

    // The player and its settings
    player = this.physics.add.sprite(100, 450, 'dog');

    //  Player physics properties. Give the little guy a slight bounce.
    player.setBounce(0.2);
    player.setCollideWorldBounds(true);

    //  Our player animations, turning, walking left and walking right.
    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dog', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dog', frame: 4 } ],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dog', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    //  Input Events
    cursors = this.input.keyboard.createCursorKeys();

    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    stars = this.physics.add.group();

for (let i = 0; i < 12; i++)
{
    let isRed = Phaser.Math.Between(0, 4) === 0; // 20% chance

    let star = stars.create(
        Phaser.Math.Between(0, 800),
        0,
        isRed ? 'redstar' : 'star'
    );

    star.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
    star.body.gravity.y = Phaser.Math.Between(50, 200);
    star.setData('value', isRed ? 50 : 10);
}

    bombs = this.physics.add.group();

    spikes = this.physics.add.staticGroup();

    //  The score
    scoreText = this.add.text(16, 16, 'score: 0', { fontSize: '32px', fill: '#000' });
    levelText = this.add.text(16, 50, 'Level: 1', {
    fontSize: '32px',
    fill: '#004'});


    //  Collide the player and the stars with the platforms
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(bombs, platforms);


    spikes.create(300, 530, 'spike');
    spikes.create(500, 530, 'spike');
    spikes.create(700, 530, 'spike');

    //  Checks to see if the player overlaps with any of the stars if he does call the collectStar function
    this.physics.add.overlap(player, stars, collectStar, null, this);

    this.physics.add.collider(player, bombs, hitBomb, null, this);
    this.physics.add.collider(player, spikes, hitSpike, null, this);
}

function update ()
{
    if (gameOver)
    {
        return;
    }

    if (cursors.left.isDown)
    {
        player.setVelocityX(-160);

        player.anims.play('left', true);
    }
    else if (cursors.right.isDown)
    {
        player.setVelocityX(160);

        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);

        player.anims.play('turn');
    }

    if (this.spaceKey.isDown && player.body.touching.down)
{
    player.setVelocityY(-330);
}
}

function collectStar (player, star)
{
    star.disableBody(true, true);

    // Add and update the score
    score += star.getData('value') || 10;
    scoreText.setText('Score: ' + score);

    if (stars.countActive(true) === 0)
{
    level++;

    levelText.setText('Level: ' + level);

    // Respawn stars
    stars.children.iterate(function (child) {
        child.enableBody(true, child.x, 0, true, true);

        child.setBounceY(Phaser.Math.FloatBetween(0.4 + level * 0.05, 0.8));
        child.body.gravity.y = Phaser.Math.Between(20 + level * 5, 120 + level * 10);
    });

    var x = (player.x < 400)
        ? Phaser.Math.Between(400, 800)
        : Phaser.Math.Between(0, 400);

    var bomb = bombs.create(x, 16, 'bomb');
    bomb.setBounce(1);
    bomb.setCollideWorldBounds(true);
    bomb.setVelocity(Phaser.Math.Between(-200, 200), 20);
    bomb.allowGravity = false;
}
}

function hitBomb (player, bomb)
{
    this.physics.pause();

    player.setTint(0xff0000);

    player.anims.play('turn');

    gameOver = true;
}

function hitSpike (player, spike)
{
    this.physics.pause();

    player.setTint(0xff0000);
    player.anims.play('turn');

    gameOver = true;
}

</script>

</body>
</html>
